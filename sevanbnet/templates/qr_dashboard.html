<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Manager — SevanB.net</title>
  <style>
    :root {
      --bg:           #0a0a0a;
      --surface:      #111111;
      --surface-2:    #191919;
      --border:       #252525;
      --border-2:     #2e2e2e;
      --accent:       #00c9b1;
      --accent-hover: #00e0c6;
      --accent-dim:   rgba(0,201,177,.1);
      --text:         #e8e8e8;
      --text-muted:   #666;
      --text-dim:     #333;
      --danger:       #e05c5c;
      --danger-dim:   rgba(224,92,92,.1);
      --success:      #4caf7d;
      --toggle-off:   #2e2e2e;
      --toggle-on:    #00c9b1;
      --font:         -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --mono:         'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 54px;
    }
    .header-title {
      display: flex; align-items: center; gap: .55rem;
      font-size: .95rem; font-weight: 600; letter-spacing: .03em;
    }
    .header-title svg { flex-shrink: 0; }

    #new-btn {
      background: var(--accent); color: #000;
      border: none; padding: .42rem 1rem;
      border-radius: 6px; font-weight: 600; font-size: .82rem;
      cursor: pointer; transition: background .15s; letter-spacing: .02em;
    }
    #new-btn:hover { background: var(--accent-hover); }

    /* ── New Redirect Panel ── */
    #new-form-panel {
      max-height: 0; overflow: hidden;
      transition: max-height .32s ease;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    #new-form-panel.open { max-height: 420px; }

    #new-form {
      padding: 1.5rem 2rem 1.75rem;
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
      max-width: 680px;
    }
    .fg { display: flex; flex-direction: column; gap: .3rem; }
    .fg.span2 { grid-column: 1 / -1; }
    .fg label {
      font-size: .7rem; text-transform: uppercase;
      letter-spacing: .07em; color: var(--text-muted); font-weight: 500;
    }
    .fg input[type="text"], .fg input[type="url"] {
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); padding: .48rem .7rem; border-radius: 6px;
      font-size: .88rem; outline: none; transition: border-color .15s;
      width: 100%;
    }
    .fg input[type="text"]:focus, .fg input[type="url"]:focus { border-color: var(--accent); }
    .fg input[name="short_code"] { font-family: var(--mono); }

    .color-row {
      display: flex; align-items: center; gap: .75rem;
      grid-column: 1 / -1;
    }
    .color-row span { font-size: .7rem; text-transform: uppercase;
      letter-spacing: .07em; color: var(--text-muted); font-weight: 500; }
    .color-pair { display: flex; align-items: center; gap: .4rem; }
    .color-pair label { font-size: .78rem; color: var(--text-muted); }
    input[type="color"] {
      width: 28px; height: 28px; border-radius: 4px;
      border: 1px solid var(--border); background: none;
      cursor: pointer; padding: 2px;
    }

    .form-actions {
      grid-column: 1 / -1; display: flex; gap: .65rem; align-items: center;
      padding-top: .25rem;
    }
    .btn-primary {
      background: var(--accent); color: #000; border: none;
      padding: .48rem 1.2rem; border-radius: 6px;
      font-weight: 600; font-size: .83rem; cursor: pointer;
      transition: background .15s;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost {
      background: none; color: var(--text-muted);
      border: 1px solid var(--border); padding: .48rem .9rem;
      border-radius: 6px; font-size: .83rem; cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-2); }

    /* ── Grid ── */
    main { padding: 1.5rem 2rem; }
    #cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.2rem;
    }
    .empty-state, .loading-state {
      grid-column: 1 / -1; text-align: center;
      color: var(--text-muted); padding: 5rem 0; font-size: .9rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      transition: opacity .3s, transform .3s, border-color .2s;
    }
    .card:hover { border-color: var(--border-2); }
    .card.inactive { opacity: .55; }
    .card.inactive .qr-img { filter: grayscale(1) opacity(.6); }

    .card-section {
      padding: .65rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .card-section:last-child { border-bottom: none; }

    /* Header row */
    .card-header {
      display: flex; align-items: center; justify-content: space-between; gap: .5rem;
    }
    .label-input {
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: .92rem; font-weight: 600;
      flex: 1; min-width: 0; padding: 3px 5px; border-radius: 4px;
      transition: background .15s;
    }
    .label-input:hover { background: var(--surface-2); }
    .label-input:focus { background: var(--surface-2); outline: 1px solid var(--border-2); }

    /* Toggle */
    .toggle-switch {
      position: relative; display: inline-block;
      width: 36px; height: 20px; cursor: pointer; flex-shrink: 0;
    }
    .toggle-switch input { display: none; }
    .toggle-track {
      position: absolute; inset: 0; background: var(--toggle-off);
      border-radius: 10px; transition: background .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--toggle-on); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 14px; height: 14px; background: #fff;
      border-radius: 50%; transition: transform .2s;
    }
    .toggle-switch input:checked + .toggle-track .toggle-thumb { transform: translateX(16px); }

    /* QR image */
    .card-qr {
      display: flex; justify-content: center; align-items: center;
      padding: 1.25rem 1rem; background: var(--surface-2);
    }
    .qr-img {
      width: 160px; height: 160px;
      image-rendering: pixelated; border-radius: 4px;
    }

    /* Short URL */
    .url-row { display: flex; align-items: center; gap: .5rem; }
    .short-url-text {
      font-family: var(--mono); font-size: .7rem; color: var(--accent);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .copy-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); padding: .22rem .55rem;
      border-radius: 4px; font-size: .72rem; cursor: pointer;
      transition: color .15s, border-color .15s; white-space: nowrap; flex-shrink: 0;
    }
    .copy-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* Target URL */
    .target-row { display: flex; align-items: center; gap: .5rem; }
    .target-input {
      flex: 1; background: var(--surface-2);
      border: 1px solid transparent; color: var(--text-muted);
      font-size: .78rem; padding: .32rem .58rem; border-radius: 4px;
      outline: none; min-width: 0; transition: border-color .15s, color .15s;
    }
    .target-input:focus { border-color: var(--border-2); color: var(--text); }
    .save-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); padding: .28rem .58rem;
      border-radius: 4px; font-size: .72rem; cursor: pointer;
      transition: color .15s, border-color .15s; white-space: nowrap; flex-shrink: 0;
    }
    .save-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* Colors */
    .colors-row { display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
    .color-controls { display: flex; align-items: center; gap: .45rem; }
    .color-controls span { font-size: .72rem; color: var(--text-muted); }
    .apply-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); padding: .22rem .5rem;
      border-radius: 4px; font-size: .72rem; cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .apply-btn:hover { color: var(--accent); border-color: var(--accent); }
    .dl-btn {
      color: var(--text-muted); font-size: .72rem;
      text-decoration: none; border: 1px solid var(--border);
      padding: .22rem .55rem; border-radius: 4px;
      transition: color .15s, border-color .15s; white-space: nowrap;
    }
    .dl-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* Stats */
    .stats-row {
      display: flex; align-items: flex-end;
      justify-content: space-between; gap: .75rem;
    }
    .sparkline-wrap { display: flex; flex-direction: column; gap: .3rem; }
    .spark-label { font-size: .62rem; color: var(--text-dim); }
    .total-scans { font-size: 1.3rem; font-weight: 600; white-space: nowrap; line-height: 1; }
    .total-scans-sub { font-size: .65rem; color: var(--text-muted); text-align: right; }

    /* Footer */
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .created-date { font-size: .68rem; color: var(--text-muted); }
    .delete-btn {
      background: none; border: none; color: var(--text-muted);
      font-size: .72rem; cursor: pointer; padding: .25rem .5rem;
      border-radius: 4px; transition: color .15s, background .15s;
    }
    .delete-btn:hover { color: var(--danger); background: var(--danger-dim); }

    /* Toast */
    #toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 1000;
      display: flex; flex-direction: column; gap: .4rem; pointer-events: none;
    }
    .toast {
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); padding: .55rem 1rem; border-radius: 6px;
      font-size: .83rem; opacity: 0; transform: translateY(6px);
      transition: opacity .2s, transform .2s; max-width: 300px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok   { border-color: var(--success); }
    .toast.err  { border-color: var(--danger); }

    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      main   { padding: 1rem; }
      #cards-grid { grid-template-columns: 1fr; }
      #new-form   { grid-template-columns: 1fr; }
      .fg.span2   { grid-column: 1; }
      .color-row  { grid-column: 1; flex-wrap: wrap; }
      .form-actions { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <!-- simple QR icon -->
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2"  y="2"  width="8" height="8" rx="1"/><rect x="14" y="2"  width="8" height="8" rx="1"/>
      <rect x="2"  y="14" width="8" height="8" rx="1"/>
      <rect x="14" y="14" width="3" height="3"/><rect x="19" y="14" width="3" height="3"/>
      <rect x="14" y="19" width="3" height="3"/><rect x="19" y="19" width="3" height="3"/>
      <rect x="4"  y="4"  width="4" height="4" fill="var(--accent)" stroke="none"/>
      <rect x="16" y="4"  width="4" height="4" fill="var(--accent)" stroke="none"/>
      <rect x="4"  y="16" width="4" height="4" fill="var(--accent)" stroke="none"/>
    </svg>
    QR Manager
  </div>
  <button id="new-btn">+ New Redirect</button>
</header>

<div id="new-form-panel">
  <form id="new-form" autocomplete="off">
    <div class="fg">
      <label for="f-label">Label</label>
      <input id="f-label" name="label" type="text" placeholder="e.g. Sonar BCI Demo" required>
    </div>
    <div class="fg">
      <label for="f-code">Short Code</label>
      <input id="f-code" name="short_code" type="text" placeholder="e.g. sonar-bci" required
             pattern="[a-z0-9\-]+" title="Lowercase letters, numbers, hyphens only">
    </div>
    <div class="fg span2">
      <label for="f-url">Target URL</label>
      <input id="f-url" name="target_url" type="url" placeholder="https://..." required>
    </div>
    <div class="color-row">
      <span>QR Colors</span>
      <div class="color-pair">
        <label>Foreground</label>
        <input name="fg_color" type="color" value="#000000">
      </div>
      <div class="color-pair">
        <label>Background</label>
        <input name="bg_color" type="color" value="#ffffff">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">Create Redirect</button>
      <button type="button" class="btn-ghost" id="cancel-btn">Cancel</button>
    </div>
  </form>
</div>

<main>
  <div id="cards-grid">
    <div class="loading-state">Loading…</div>
  </div>
</main>

<div id="toast-container"></div>

<script>
  const QR_BASE = "{{ qr_base_url }}";

  // ── CSRF ──────────────────────────────────────────────────────────────────
  function csrf() {
    return document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
  }

  // ── API ───────────────────────────────────────────────────────────────────
  const API = {
    async call(url, opts = {}) {
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf() },
        ...opts,
      });
      if (res.status === 204) return null;
      const body = await res.json();
      if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
      return body;
    },
    list:   ()       => API.call('/api/qr/redirects/'),
    create: (d)      => API.call('/api/qr/redirects/', { method: 'POST',   body: JSON.stringify(d) }),
    patch:  (id, d)  => API.call(`/api/qr/redirects/${id}/`, { method: 'PATCH',  body: JSON.stringify(d) }),
    del:    (id)     => API.call(`/api/qr/redirects/${id}/`, { method: 'DELETE' }),
  };

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toast(msg, type = '') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
  }

  // ── Sparkline SVG ─────────────────────────────────────────────────────────
  function sparkline(days) {
    if (!days || !days.length) return '';
    const W = 168, H = 34, gap = 1;
    const bw  = Math.floor((W - gap * (days.length - 1)) / days.length);
    const max = Math.max(...days.map(d => d.count), 1);
    const bars = days.map((d, i) => {
      const bh = d.count === 0 ? 2 : Math.max(Math.round((d.count / max) * H), 3);
      const x  = i * (bw + gap), y = H - bh;
      return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="1"
                fill="var(--accent)" fill-opacity="${d.count ? .75 : .15}"/>`;
    }).join('');
    return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${bars}</svg>`;
  }

  // ── Render a card ─────────────────────────────────────────────────────────
  function cardHTML(r) {
    const shortUrl  = `${QR_BASE}/r/${r.short_code}/`;
    const imgSrc    = `/api/qr/image/${r.id}/`;
    const dlHref    = `/api/qr/image/${r.id}/?download=1`;
    const created   = new Date(r.created_at).toLocaleDateString('en-US',
                      { year:'numeric', month:'short', day:'numeric' });
    const scanWord  = r.total_scans === 1 ? 'scan' : 'scans';

    return `
    <div class="card ${r.is_active ? '' : 'inactive'}" data-id="${r.id}">
      <div class="card-section card-header">
        <input class="label-input" value="${esc(r.label)}"
               data-orig="${esc(r.label)}" placeholder="Label" title="Click to edit label">
        <label class="toggle-switch" title="${r.is_active ? 'Active – click to deactivate' : 'Inactive – click to activate'}">
          <input type="checkbox" class="toggle-chk" ${r.is_active ? 'checked' : ''}>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>

      <div class="card-section card-qr">
        <img class="qr-img" src="${imgSrc}" alt="QR code for ${esc(r.short_code)}" loading="lazy">
      </div>

      <div class="card-section">
        <div class="url-row">
          <span class="short-url-text" title="${esc(shortUrl)}">${esc(shortUrl)}</span>
          <button class="copy-btn" data-url="${esc(shortUrl)}">Copy</button>
        </div>
      </div>

      <div class="card-section">
        <div class="target-row">
          <input class="target-input" value="${esc(r.target_url)}"
                 data-orig="${esc(r.target_url)}" type="url" placeholder="Target URL">
          <button class="save-btn">Save</button>
        </div>
      </div>

      <div class="card-section">
        <div class="colors-row">
          <div class="color-controls">
            <span>QR</span>
            <input type="color" class="clr-fg" value="${esc(r.fg_color)}">
            <input type="color" class="clr-bg" value="${esc(r.bg_color)}">
            <button class="apply-btn">↻ Apply</button>
          </div>
          <a class="dl-btn" href="${dlHref}" download="qr-${esc(r.short_code)}.png">⬇ PNG</a>
        </div>
      </div>

      <div class="card-section">
        <div class="stats-row">
          <div class="sparkline-wrap">
            ${sparkline(r.scans_14d)}
            <span class="spark-label">last 14 days</span>
          </div>
          <div>
            <div class="total-scans">${r.total_scans}</div>
            <div class="total-scans-sub">${scanWord} total</div>
          </div>
        </div>
      </div>

      <div class="card-section card-footer">
        <span class="created-date">Created ${created}</span>
        <button class="delete-btn">Delete</button>
      </div>
    </div>`;
  }

  // ── Bind card interactions ────────────────────────────────────────────────
  function bindCard(r) {
    const card = document.querySelector(`.card[data-id="${r.id}"]`);
    if (!card) return;

    // ── Active toggle
    card.querySelector('.toggle-chk').addEventListener('change', async function() {
      try {
        await API.patch(r.id, { is_active: this.checked });
        card.classList.toggle('inactive', !this.checked);
        this.closest('.toggle-switch').title = this.checked
          ? 'Active – click to deactivate' : 'Inactive – click to activate';
      } catch(e) {
        this.checked = !this.checked;
        toast(`Error: ${e.message}`, 'err');
      }
    });

    // ── Label (save on blur / Enter)
    const labelEl = card.querySelector('.label-input');
    const saveLabel = async () => {
      const v = labelEl.value.trim();
      if (!v || v === labelEl.dataset.orig) return;
      try {
        await API.patch(r.id, { label: v });
        labelEl.dataset.orig = v;
      } catch(e) {
        labelEl.value = labelEl.dataset.orig;
        toast(`Error: ${e.message}`, 'err');
      }
    };
    labelEl.addEventListener('blur', saveLabel);
    labelEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); labelEl.blur(); } });

    // ── Target URL
    const targetEl  = card.querySelector('.target-input');
    const saveBtn   = card.querySelector('.save-btn');
    const saveTarget = async () => {
      const v = targetEl.value.trim();
      if (!v || v === targetEl.dataset.orig) return;
      try {
        saveBtn.textContent = '…';
        await API.patch(r.id, { target_url: v });
        targetEl.dataset.orig = v;
        saveBtn.textContent = '✓';
        setTimeout(() => saveBtn.textContent = 'Save', 1600);
      } catch(e) {
        targetEl.value = targetEl.dataset.orig;
        saveBtn.textContent = 'Save';
        toast(`Error: ${e.message}`, 'err');
      }
    };
    saveBtn.addEventListener('click', saveTarget);
    targetEl.addEventListener('keydown', e => { if (e.key === 'Enter') saveTarget(); });

    // ── Copy URL
    const copyBtn = card.querySelector('.copy-btn');
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(copyBtn.dataset.url).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy', 2000);
      });
    });

    // ── QR color refresh
    const fgEl  = card.querySelector('.clr-fg');
    const bgEl  = card.querySelector('.clr-bg');
    const apBtn = card.querySelector('.apply-btn');
    const qrImg = card.querySelector('.qr-img');
    apBtn.addEventListener('click', async () => {
      const fg = fgEl.value, bg = bgEl.value;
      try {
        apBtn.textContent = '…';
        await API.patch(r.id, { fg_color: fg, bg_color: bg });
        qrImg.src = `/api/qr/image/${r.id}/?fg=${encodeURIComponent(fg)}&bg=${encodeURIComponent(bg)}&t=${Date.now()}`;
        // also update download link
        const dlBtn = card.querySelector('.dl-btn');
        dlBtn.href = `/api/qr/image/${r.id}/?download=1&fg=${encodeURIComponent(fg)}&bg=${encodeURIComponent(bg)}`;
        apBtn.textContent = '↻ Apply';
        toast('QR updated', 'ok');
      } catch(e) {
        apBtn.textContent = '↻ Apply';
        toast(`Error: ${e.message}`, 'err');
      }
    });

    // ── Delete
    card.querySelector('.delete-btn').addEventListener('click', async () => {
      const scanNote = r.total_scans ? ` and its ${r.total_scans} scan record${r.total_scans !== 1 ? 's' : ''}` : '';
      if (!confirm(`Delete "${r.label}"${scanNote}? This cannot be undone.`)) return;
      try {
        await API.del(r.id);
        card.style.transition = 'opacity .25s, transform .25s';
        card.style.opacity = '0'; card.style.transform = 'scale(.96)';
        setTimeout(() => card.remove(), 280);
      } catch(e) { toast(`Error: ${e.message}`, 'err'); }
    });
  }

  // ── Render all cards ──────────────────────────────────────────────────────
  async function refresh() {
    const grid = document.getElementById('cards-grid');
    try {
      const data = await API.list();
      if (!data.length) {
        grid.innerHTML = '<div class="empty-state">No redirects yet — create one above to get started.</div>';
        return;
      }
      grid.innerHTML = data.map(cardHTML).join('');
      data.forEach(bindCard);
    } catch(e) {
      grid.innerHTML = `<div class="empty-state">Could not load redirects: ${esc(e.message)}</div>`;
    }
  }

  // ── New redirect form ─────────────────────────────────────────────────────
  function setupNewForm() {
    const panel  = document.getElementById('new-form-panel');
    const form   = document.getElementById('new-form');
    const newBtn = document.getElementById('new-btn');
    const canBtn = document.getElementById('cancel-btn');

    const open  = () => { panel.classList.add('open');    newBtn.textContent = '✕ Cancel'; };
    const close = () => { panel.classList.remove('open'); newBtn.textContent = '+ New Redirect'; form.reset(); };

    newBtn.addEventListener('click', () => panel.classList.contains('open') ? close() : open());
    canBtn.addEventListener('click', close);

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const sub = form.querySelector('[type="submit"]');
      sub.disabled = true; sub.textContent = 'Creating…';
      try {
        await API.create({
          label:      form.label.value.trim(),
          short_code: form.short_code.value.trim(),
          target_url: form.target_url.value.trim(),
          fg_color:   form.fg_color.value,
          bg_color:   form.bg_color.value,
        });
        close();
        await refresh();
        toast('Redirect created!', 'ok');
      } catch(e) {
        toast(`Error: ${e.message}`, 'err');
      } finally {
        sub.disabled = false; sub.textContent = 'Create Redirect';
      }
    });
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    setupNewForm();
    refresh();
  });
</script>
</body>
</html>
